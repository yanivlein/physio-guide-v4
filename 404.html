<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>הדף לא נמצא | מדריך פסיכופיזיולוגיה</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Frank+Ruhl+Libre:wght@300;400;700;900&family=Lato:wght@400;700&display=swap" rel="stylesheet">
  <style>
    :root{--bg:#FDFCF9;--text:#1C1B18;--text-mid:#4A4840;--text-light:#8A8680;--accent:#2A4B7C;--border:#E2DDD5;--font-body:'Frank Ruhl Libre',Georgia,serif;--font-ui:'Lato',system-ui,sans-serif;}
    *{box-sizing:border-box;margin:0;padding:0;}
    body{background:var(--bg);color:var(--text);font-family:var(--font-body);min-height:100vh;display:flex;align-items:center;justify-content:center;padding:32px;-webkit-font-smoothing:antialiased;}
    .box{max-width:440px;text-align:center;}
    .code{font-family:var(--font-ui);font-size:0.72rem;font-weight:700;letter-spacing:0.16em;text-transform:uppercase;color:var(--accent);margin-bottom:18px;}
    h1{font-size:2rem;font-weight:900;line-height:1.2;margin-bottom:16px;}
    p{font-size:1rem;color:var(--text-mid);line-height:1.75;margin-bottom:32px;}
    a{display:inline-flex;align-items:center;gap:8px;background:var(--accent);color:#fff;font-family:var(--font-ui);font-size:0.85rem;font-weight:700;padding:11px 24px;border-radius:3px;text-decoration:none;transition:background .2s;}
    a:hover{background:#1E3659;}
  </style>
</head>
<body>
  <div class="box">
    <div class="code">404 · הדף לא נמצא</div>
    <h1>הגענו למבוי סתום</h1>
    <p>הדף שחיפשת לא קיים — אולי הקישור שגוי או שהתוכן עוד בבנייה. אפשר לחזור לעמוד הראשי ולהתחיל משם.</p>
    <a href="/">חזרה לעמוד הראשי →</a>
  </div>
</body>
</html>
